[workspace]
name = "crispat"
channels = ["conda-forge", "bioconda"]
platforms = ["linux-64", "osx-arm64"]

[dependencies]
python = ">=3.10,<3.12"
anndata = ">=0.10"
muon = ">=0.1"
scanpy = ">=1.9"
pandas = ">=2.0"
numpy = ">=1.24"
scipy = ">=1.10"
pertpy = ">=1.0.3,<2"

[pypi-dependencies]
crispat = { git = "https://github.com/btraven00/crispat", branch = "parallel-gauss" }
